services:
  # Banco de Dados PostgreSQL
  db:
    image: postgres:16
    container_name: pacs_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin@123
      POSTGRES_DB: pacs_portal_db
    volumes:
      - pacs_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d pacs_portal_db"]
      interval: 3s
      timeout: 3s
      retries: 10

  # Backend API (.NET 10)
  api:
    build: ./backend
    container_name: pacs_api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__PostgreSQL: "Host=db;Port=5432;Database=pacs_portal_db;Username=admin;Password=admin@123"
      Jwt__Key: "ChaveDeProducao_TroqueParaUmaChaveSegura_32chars!"
      Jwt__Issuer: "PortalDoCliente"
      Email__SmtpHost: ""
      Email__SmtpPort: "587"
      Email__SmtpUser: ""
      Email__SmtpPassword: ""
      Email__Remetente: ""
      CorsOrigins: "http://10.31.0.246,http://10.31.0.246:80"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  # Portal do Cliente (Frontend Nginx + Reverse Proxy)
  portal:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    container_name: pacs_portal
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pacs_db_data:
